services:
  # 1. MinIO 服务 (必须存在，用于存储向量数据)
  minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: local-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000" # MinIO API 端口
      - "9001:9001" # MinIO 控制台端口
    volumes:
      - ./data/minio:/minio_data
    command: minio server /minio_data --console-address ":9001"
    networks:
      - rag-net
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # 2. Milvus 服务 (启用嵌入式 Etcd，连接上面的 MinIO)
  milvus:
    image: milvusdb/milvus:v2.5.4
    container_name: local-milvus
    command: ["milvus", "run", "standalone"]
    ports:
      - "19530:19530"
      - "9091:9091"
    environment:
      # ✅ 启用嵌入式 Etcd (这样就不需要单独的 etcd 容器了)
      - ETCD_USE_EMBED=true
      - ETCD_DATA_DIR=/var/lib/milvus/etcd
      # ✅ 关键：告诉 Milvus 去连接 docker-compose 里的 minio 服务
      # 注意：这里不能用 localhost，要用服务名 "minio"
      - MINIO_ADDRESS=minio:9000
      - MINIO_ACCESS_KEY_ID=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      # 用户配置
      - MILVUS_USERNAME=${MILVUS_USERNAME:-root}
      - MILVUS_PASSWORD=${MILVUS_PASSWORD:-Milvus}
    volumes:
      - ./data/milvus:/var/lib/milvus
    networks:
      - rag-net
    restart: always
    depends_on:
      - minio
    deploy:
      resources:
        limits:
          memory: 4G

  # 3. PostgreSQL 服务 (保持不变)
  postgres:
    image: postgres:15-alpine
    container_name: local-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rag_db}
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin123}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    networks:
      - rag-net
    restart: always

  # 4. pgAdmin 服务 (用于管理 PostgreSQL)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: local-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    volumes:
      - ./data/pgadmin:/var/lib/pgadmin
    networks:
      - rag-net
    restart: always
    depends_on:
      - postgres

networks:
  rag-net:
    driver: bridge